<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Home Feed Screen" description="PantherLoop task feed in a 390×844 phone frame, built from the design system components" -->
<helmet>
  <script src="./ds-base.js"></script>
  <style>
    body { margin: 0; background: #E7EBF2; font-family: var(--font-sans); display: flex; justify-content: center; padding: 32px 0; }
  </style>
</helmet>
<div style="width: 390px; height: 844px; background: var(--surface); border-radius: 44px; overflow: hidden; box-shadow: 0 24px 70px rgba(11,31,75,0.28), 0 0 0 11px #0a0e1a, 0 0 0 12px #2a3346; display: flex; flex-direction: column; font-family: var(--font-sans);">

  <!-- status bar -->
  <div style="height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 22px 0 26px; background: var(--navy); color: #fff;">
    <span style="font-size: 15px; font-weight: 600;">9:41</span>
    <span style="font-size: 12px; opacity: 0.85;">5G &nbsp; ▮▮▮</span>
  </div>

  <!-- top app bar -->
  <x-import component-from-global-scope="PantherLoopDesignSystem_4d00e2.TopAppBar" title="PantherLoop" right="bell" badge="{{ true }}" hint-size="100%,56px"></x-import>

  <!-- search -->
  <div style="padding: 12px 16px 8px; background: var(--white); border-bottom: 1px solid var(--border);">
    <div style="display: flex; align-items: center; gap: 8px; height: 40px; padding: 0 12px; background: var(--surface); border-radius: 10px;">
      <x-import component-from-global-scope="PantherLoopDesignSystem_4d00e2.Icon" name="search" size="18" color="var(--text-tertiary)" hint-size="18px,18px"></x-import>
      <span style="font-size: 15px; color: var(--text-tertiary);">Search tasks, rides, items…</span>
    </div>
  </div>

  <!-- category pills -->
  <div style="display: flex; gap: 8px; padding: 12px 16px; background: var(--white); overflow-x: auto;">
    <x-import component-from-global-scope="PantherLoopDesignSystem_4d00e2.CategoryPill" active="{{ true }}" hint-size="56px,34px">All</x-import>
    <x-import component-from-global-scope="PantherLoopDesignSystem_4d00e2.CategoryPill" hint-size="80px,34px">Delivery</x-import>
    <x-import component-from-global-scope="PantherLoopDesignSystem_4d00e2.CategoryPill" hint-size="64px,34px">Rides</x-import>
    <x-import component-from-global-scope="PantherLoopDesignSystem_4d00e2.CategoryPill" hint-size="80px,34px">Tutoring</x-import>
  </div>

  <!-- feed -->
  <div style="flex: 1; min-height: 0; overflow-y: auto; background: var(--surface); padding: 16px; display: flex; flex-direction: column; gap: 12px;">
    <div style="display: flex; align-items: center; justify-content: space-between;">
      <h2 style="margin: 0; font-size: 17px; font-weight: 600; color: var(--text-primary);">Open near you</h2>
      <span style="font-size: 13px; color: var(--text-secondary);">3 tasks</span>
    </div>

    <x-import component-from-global-scope="PantherLoopDesignSystem_4d00e2.TaskCard"
      title="Pick up textbook from GC library" status="open" location="GC Building" category="Delivery"
      deadline="Today 4pm" description="Reserved textbook at the circulation desk — drop at PG-5 lobby."
      poster-name="Maria R." poster-initials="MR" poster-tier="helper" rating="4.9" price="12"
      hint-size="100%,210px"></x-import>

    <x-import component-from-global-scope="PantherLoopDesignSystem_4d00e2.TaskCard"
      title="Ride to MMC from West Kendall" status="open" location="West Kendall" category="Rides"
      deadline="Tomorrow 8am" description="Need a ride for an 8:30 lecture. Can split gas + tip."
      poster-name="Diego C." poster-initials="DC" poster-tier="driver" rating="4.8" price="9"
      hint-size="100%,210px"></x-import>

    <x-import component-from-global-scope="PantherLoopDesignSystem_4d00e2.TaskCard"
      title="Calc II tutoring before midterm" status="in-progress" location="Green Library" category="Tutoring"
      deadline="Thu 6pm" description="Two-hour session on integrals and series."
      poster-name="Aisha K." poster-initials="AK" poster-tier="helper" rating="5.0" price="40"
      hint-size="100%,210px"></x-import>
  </div>

  <!-- bottom nav -->
  <x-import component-from-global-scope="PantherLoopDesignSystem_4d00e2.BottomNav" active="home" hint-size="100%,72px"></x-import>
</div>

</x-dc>
</body>
</html>
