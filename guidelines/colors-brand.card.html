<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--white); font-family: var(--font-sans); }
  .row { display: flex; gap: 0; }
  .sw { flex: 1; height: 120px; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; box-sizing: border-box; }
  .sw .n { font-size: 13px; font-weight: 600; }
  .sw .h { font-size: 12px; opacity: 0.8; font-variant-numeric: tabular-nums; }
  .light { color: #fff; }
  .dark { color: var(--text-primary); }
</style>
</head>
<body>
<div class="row">
  <div class="sw light" style="background: var(--navy)"><span class="n">Navy</span><span class="h">#0B1F4B</span></div>
  <div class="sw light" style="background: var(--navy-mid)"><span class="n">Navy Mid</span><span class="h">#1A3A6B</span></div>
  <div class="sw light" style="background: var(--gold)"><span class="n">Gold</span><span class="h">#B6862C</span></div>
  <div class="sw dark" style="background: var(--gold-light)"><span class="n">Gold Light</span><span class="h">#D4A843</span></div>
</div>
</body>
</html>
