<!-- @dsCard group="Spacing" viewport="700x190" name="Radius & Elevation" subtitle="Corners + soft navy shadows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface); font-family: var(--font-sans); padding: 24px; }
  .wrap { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 70px; height: 56px; background: var(--white); border: 1px solid var(--border); }
  .cap { font-size: 11px; color: var(--text-secondary); text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <div class="item"><div class="box" style="border-radius:10px"></div><span class="cap">Control<br>10pt</span></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><span class="cap">Card<br>16pt</span></div>
  <div class="item"><div class="box" style="border-radius:24px 24px 0 0"></div><span class="cap">Sheet<br>24pt top</span></div>
  <div class="item"><div class="box" style="border-radius:20px;width:96px;height:30px"></div><span class="cap">Pill<br>20pt</span></div>
  <div class="item"><div class="box" style="border-radius:50%;width:46px;height:46px"></div><span class="cap">Avatar<br>circle</span></div>
  <div class="item"><div class="box" style="border-radius:16px;border:none;box-shadow:var(--shadow-card)"></div><span class="cap">shadow<br>card</span></div>
  <div class="item"><div class="box" style="border-radius:16px;border:none;box-shadow:var(--shadow-raised)"></div><span class="cap">shadow<br>raised</span></div>
</div>
</body>
</html>
