<!-- @dsCard group="Spacing" viewport="700x180" name="Scale" subtitle="4 · 8 · 12 · 16 · 24 · 32" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--white); font-family: var(--font-sans); padding: 22px; }
  .row { display: flex; gap: 20px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--navy); border-radius: 3px; }
  .cap { font-size: 12px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
  .lead { font-size: 13px; color: var(--text-tertiary); margin: 0 0 14px; }
</style>
</head>
<body>
<p class="lead">8pt base grid · screen padding 16 · section gap 24 · card padding 14×16</p>
<div class="row">
  <div class="item"><div class="bar" style="width:4px;height:4px"></div><span class="cap">4</span></div>
  <div class="item"><div class="bar" style="width:8px;height:8px"></div><span class="cap">8</span></div>
  <div class="item"><div class="bar" style="width:12px;height:12px"></div><span class="cap">12</span></div>
  <div class="item"><div class="bar" style="width:16px;height:16px"></div><span class="cap">16</span></div>
  <div class="item"><div class="bar" style="width:24px;height:24px"></div><span class="cap">24</span></div>
  <div class="item"><div class="bar" style="width:32px;height:32px"></div><span class="cap">32</span></div>
</div>
</body>
</html>
