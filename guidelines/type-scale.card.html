<!-- @dsCard group="Type" viewport="700x320" name="Scale" subtitle="Inter — Display to Micro" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--white); font-family: var(--font-sans); color: var(--text-primary); padding: 22px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: none; }
  .spec { width: 150px; flex: 0 0 auto; font-size: 12px; color: var(--text-tertiary); font-variant-numeric: tabular-nums; }
  .demo { color: var(--text-primary); }
</style>
</head>
<body>
  <div class="row"><span class="spec">Display · 32 / 600</span><span class="demo" style="font-size:32px;font-weight:600;letter-spacing:-0.02em">PantherLoop</span></div>
  <div class="row"><span class="spec">H1 · 22 / 600</span><span class="demo" style="font-size:22px;font-weight:600;letter-spacing:-0.01em">Find a task nearby</span></div>
  <div class="row"><span class="spec">H2 · 17 / 600</span><span class="demo" style="font-size:17px;font-weight:600">Open tasks near you</span></div>
  <div class="row"><span class="spec">Body · 15 / 400</span><span class="demo" style="font-size:15px">Drop the textbook at PG-5 by 4pm today.</span></div>
  <div class="row"><span class="spec">Caption · 13 / 400</span><span class="demo" style="font-size:13px;color:var(--text-secondary)">GC Building · Delivery · Today 4pm</span></div>
  <div class="row"><span class="spec">Micro · 11 / 400</span><span class="demo" style="font-size:11px;color:var(--text-secondary)">BADGES · TAB LABELS</span></div>
</body>
</html>
